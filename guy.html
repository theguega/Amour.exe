<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="assets/heart.png" type="image/png" />
        <title>Amour.exe</title>
        <style>
            body {
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #222;
                font-family: sans-serif;
            }

            .room-container {
                position: relative;
                width: 800px;
                height: 450px;
                background-image: url("assets/room.png");
                background-size: cover;
                background-position: center;
                border: 4px solid #000;
                image-rendering: auto;
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
                overflow: hidden;
                animation: roomFloat 6s ease-in-out infinite;
            }

            @keyframes roomFloat {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-5px); }
            }

            .character {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%) scale(1.5);
                transform-origin: center bottom;
                width: 157px;
                height: 256px;
                background-size: 157px 256px;
                background-image: url("assets/guy.png");
                image-rendering: auto;
                transition: transform 0.3s ease-out;
            }

            /* Idle: Gentle Breathing */
            .character.idle {
                animation: idleBreath 3s ease-in-out infinite;
            }

            @keyframes idleBreath {
                0%, 100% { transform: translateX(-50%) scale(1.5); }
                50% { transform: translateX(-50%) scale(1.52, 1.48); }
            }

            /* Talking: Excited Pulse */
            .character.talking {
                animation: talkPulse 0.4s ease-in-out infinite;
            }

            @keyframes talkPulse {
                0%, 100% { transform: translateX(-50%) scale(1.5); }
                50% { transform: translateX(-50%) scale(1.55, 1.45); }
            }

            /* Thinking: Nervous Jitter */
            .character.thinking {
                animation: thinkJitter 0.1s linear infinite;
            }

            @keyframes thinkJitter {
                0% { transform: translateX(-50%) scale(1.5) translate(1px, 1px); }
                50% { transform: translateX(-50%) scale(1.5) translate(-1px, -1px); }
                100% { transform: translateX(-50%) scale(1.5) translate(1px, -1px); }
            }

            .speech-bubble {
                position: absolute;
                top: 15%;
                left: 60%;
                background: #fff;
                border: 3px solid #000;
                border-radius: 12px;
                padding: 12px 18px;
                display: none;
                flex-direction: column;
                gap: 5px;
                box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.8);
                z-index: 100;
                max-width: 250px;
                animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            @keyframes bubblePop {
                from { transform: scale(0.5); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .speech-bubble::after {
                content: "";
                position: absolute;
                bottom: -13px;
                left: 20px;
                border-width: 13px 13px 0 0;
                border-style: solid;
                border-color: #000 transparent transparent transparent;
            }

            .dot {
                width: 8px;
                height: 8px;
                background-color: #000;
                border-radius: 50%;
                animation: bounce 1.4s infinite ease-in-out both;
            }

            .dot:nth-child(1) {
                animation-delay: -0.32s;
            }
            .dot:nth-child(2) {
                animation-delay: -0.16s;
            }

            @keyframes bounce {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }

            .sentiment-bar {
                position: absolute;
                left: 10px;
                bottom: 10px;
                width: 28px;
                height: 200px;
                background: rgba(0, 0, 0, 0.5);
                border: 2px solid #000;
                border-radius: 14px;
                overflow: hidden;
                z-index: 150;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }

            .sentiment-fill {
                width: 100%;
                height: 100%;
                background: linear-gradient(to top, #888, #c4b200, #2ecc71);
                border-radius: 0 0 12px 12px;
                transition: height 1s ease-in-out;
                position: relative;
            }

            .sentiment-fill.high {
                background: linear-gradient(to top, #27ae60, #2ecc71, #58d68d);
                box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            }

            .sentiment-icon {
                position: absolute;
                left: 10px;
                bottom: 218px;
                font-size: 22px;
                z-index: 151;
                filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));
                transition: transform 0.3s ease;
            }

            .sentiment-icon.pulse {
                animation: heartPulse 0.6s ease-in-out;
            }

            @keyframes heartPulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.3); }
            }

            .sentiment-label {
                position: absolute;
                left: 6px;
                bottom: 244px;
                font-size: 9px;
                color: #ccc;
                text-transform: uppercase;
                letter-spacing: 1px;
                z-index: 151;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="room-container">
            <div class="sentiment-label">Confidence</div>
            <div class="sentiment-icon" id="sentimentIcon">&#x26A1;</div>
            <div class="sentiment-bar">
                <div class="sentiment-fill" id="sentimentFill"></div>
            </div>

            <div class="character idle" id="character"></div>

            <div class="speech-bubble" id="typingBubble">
                <div id="dots" style="display: flex; gap: 5px;">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div id="speechText" style="display: none; max-width: 300px; word-wrap: break-word; font-size: 14px; line-height: 1.4; color: #333;"></div>
            </div>
        </div>

        <script>
            const wsUrl = "ws://localhost:8080";
            const OWN_AGENT = "man";
            let ws;

            const character = document.getElementById("character");
            const typingBubble = document.getElementById("typingBubble");
            const dots = document.getElementById("dots");
            const speechText = document.getElementById("speechText");
            const sentimentFill = document.getElementById("sentimentFill");
            const sentimentIcon = document.getElementById("sentimentIcon");

            function setCharacterState(state) {
                character.classList.remove("idle", "talking", "thinking");
                character.classList.add(state);
            }

            function connectWebSocket() {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log("Connected to the server!");
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.action === "typing") {
                        if (data.agent_type && data.agent_type !== OWN_AGENT) return;
                        setCharacterState("thinking");
                        showTypingBubble();
                    } else if (data.action === "stop_typing") {
                        if (data.agent_type && data.agent_type !== OWN_AGENT) return;
                        setCharacterState("idle");
                        hideTypingBubble();
                    } else if (data.action === "speech") {
                        if (data.agent_type && data.agent_type !== OWN_AGENT) return;
                        // Render speech immediately to avoid timing races during replay/live demos
                        setCharacterState("talking");
                        showSpeech(data.text);

                        const duration = Math.max(1800, data.text.length * 45);
                        setTimeout(() => {
                            if (character.classList.contains("talking")) {
                                setCharacterState("idle");
                            }
                        }, duration);
                    } else if (data.action === "sentiment") {
                        const agentType = data.agent_type;
                        if (agentType && agentType !== OWN_AGENT) return;
                        updateSentiment(data.compatibility, data.stage);
                    }
                };

                ws.onerror = (error) => {
                    console.error("WebSocket Error:", error);
                };

                ws.onclose = () => {
                    console.log("Disconnected. Trying to reconnect...");
                    setTimeout(connectWebSocket, 3000);
                };
            }

            function showTypingBubble() {
                speechText.style.display = "none";
                dots.style.display = "flex";
                typingBubble.style.display = "flex";
            }

            function hideTypingBubble() {
                typingBubble.style.display = "none";
            }

            function showSpeech(text) {
                dots.style.display = "none";
                speechText.innerText = text;
                speechText.style.display = "block";
                typingBubble.style.display = "flex";
            }

            function updateSentiment(compatibility, stage) {
                const pct = Math.max(0, Math.min(100, compatibility * 100));
                sentimentFill.style.height = pct + "%";
                if (pct >= 60) {
                    sentimentFill.classList.add("high");
                } else {
                    sentimentFill.classList.remove("high");
                }
                // Pulse the heart icon on update
                sentimentIcon.classList.remove("pulse");
                void sentimentIcon.offsetWidth;
                sentimentIcon.classList.add("pulse");
            }

            connectWebSocket();
        </script>
    </body>
</html>
