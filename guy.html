<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="assets/heart.png" type="image/png" />
        <title>Amour.exe</title>
        <style>
            body {
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #222;
                font-family: sans-serif;
            }

            .room-container {
                position: relative;
                width: 800px;
                height: 450px;
                background-image: url("assets/room.png");
                background-size: cover;
                background-position: center;
                border: 4px solid #000;
                image-rendering: auto;
            }

            .character {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%) scale(1.5);
                transform-origin: center bottom;
                width: 157px;
                height: 256px;
                background-size: 157px 256px;
                background-image: url("assets/guy.png");
                animation: idleAnimation 1.5s steps(3) infinite alternate;
                image-rendering: auto;
            }

            @keyframes idleAnimation {
                from {
                    background-position: 0px;
                }
                to {
                    background-position: -10px;  */
                }
            }

            .speech-bubble {
                position: absolute;
                top: 20%;
                left: 60%;
                background: #fff;
                border: 3px solid #000;
                border-radius: 8px;
                padding: 10px 15px;
                display: none;
                gap: 5px;
                box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            }

            .speech-bubble::after {
                content: "";
                position: absolute;
                bottom: -10px;
                left: 20px;
                border-width: 10px 10px 0 0;
                border-style: solid;
                border-color: #000 transparent transparent transparent;
            }

            .dot {
                width: 8px;
                height: 8px;
                background-color: #000;
                border-radius: 50%;
                animation: bounce 1.4s infinite ease-in-out both;
            }

            .dot:nth-child(1) {
                animation-delay: -0.32s;
            }
            .dot:nth-child(2) {
                animation-delay: -0.16s;
            }

            @keyframes bounce {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <div class="room-container">
            <div class="character"></div>

            <div class="speech-bubble" id="typingBubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <script>
            const wsUrl = "ws://localhost:8080";
            let ws;

            const typingBubble = document.getElementById("typingBubble");

            function connectWebSocket() {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log("Connected to the server!");
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.action === "typing") {
                        showTypingBubble();
                    } else if (data.action === "stop_typing") {
                        hideTypingBubble();
                    }
                };

                ws.onerror = (error) => {
                    console.error("WebSocket Error:", error);
                };

                ws.onclose = () => {
                    console.log("Disconnected. Trying to reconnect...");
                    setTimeout(connectWebSocket, 3000);
                };
            }

            function showTypingBubble() {
                typingBubble.style.display = "flex";
            }

            function hideTypingBubble() {
                typingBubble.style.display = "none";
            }

            connectWebSocket();

            // remove for real app
            setInterval(() => {
                typingBubble.style.display =
                    typingBubble.style.display === "flex" ? "none" : "flex";
            }, 3000);
        </script>
    </body>
</html>
